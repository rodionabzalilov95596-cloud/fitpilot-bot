# Render Blueprint — https://render.com/deploy?repo=https://github.com/rodionabzalilov95596-cloud/fitpilot-bot
# Перед Apply заполните 4 секрета ниже (скопируйте из .env).

services:
  - type: web
    name: fitpilot-bot
    runtime: node
    plan: free
    branch: main
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: ./data
      - key: LLM_PROVIDER
        value: yandex
      - key: MAX_BOT_TOKEN
        sync: false
      - key: YANDEX_API_KEY
        sync: false
      - key: YANDEX_FOLDER_ID
        sync: false
      - key: YANDEX_MODEL_URI
        sync: false
